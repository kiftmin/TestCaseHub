openapi: 3.1.0
info:
  title: TestCaseHub API
  version: "1.0.0"
  description: UAT Test Case Management API

servers:
  - url: http://localhost:3000/api

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        name: { type: string }
        email: { type: string }
        role: { type: string, enum: [ADMIN, USER] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }

    Project:
      type: object
      properties:
        id: { type: integer }
        project_code: { type: string }
        name: { type: string }
        designed_by: { type: string }
        module_name: { type: string }
        design_date: { type: string }
        test_link: { type: string, nullable: true }
        version: { type: integer }
        version_date: { type: string, format: date-time }
        test_lead_id: { type: integer, nullable: true }
        is_signed_off: { type: integer }
        sign_off_data: { type: string, nullable: true }
        objectives: { type: string, nullable: true }
        scope: { type: string, nullable: true }
        out_of_scope: { type: string, nullable: true }
        entry_criteria: { type: string, nullable: true }
        exit_criteria: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    ProjectAssignment:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        user_id: { type: integer }
        role: { type: string, enum: [TEST_LEAD, TEST_AUTHOR, BUSINESS_OWNER, TESTER, DEVELOPER, UAT_COORDINATOR] }
        assigned_at: { type: string, format: date-time }

    UseCase:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        code: { type: string }
        name: { type: string }
        priority: { type: string, nullable: true }
        category: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    TestCase:
      type: object
      properties:
        id: { type: integer }
        use_case_id: { type: integer }
        case_number: { type: string }
        title: { type: string }
        test_type: { type: string, nullable: true }
        estimated_minutes: { type: integer, nullable: true }
        acceptance_criteria: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    TestStep:
      type: object
      properties:
        id: { type: integer }
        test_case_id: { type: integer }
        step_number: { type: string }
        instruction: { type: string }
        test_data: { type: string, nullable: true }
        expected_result: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    Attachment:
      type: object
      properties:
        id: { type: integer }
        entity_type: { type: string }
        entity_id: { type: integer }
        field: { type: string, nullable: true }
        file_name: { type: string }
        file_url: { type: string }
        file_type: { type: string, nullable: true }
        created_at: { type: string, format: date-time }

    TestRun:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        name: { type: string }
        status: { type: string, enum: [scheduled, in_progress, completed] }
        scheduled_at: { type: string, format: date-time, nullable: true }
        passed: { type: boolean, nullable: true }
        source_test_run_id: { type: integer, nullable: true }
        entry_confirmed: { type: boolean }
        entry_confirmed_by_user_id: { type: integer, nullable: true }
        entry_confirmed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    TestRunChecklistItem:
      type: object
      properties:
        id: { type: integer }
        test_run_id: { type: integer }
        item_text: { type: string }
        is_checked: { type: boolean }
        checked_by_user_id: { type: integer, nullable: true }
        checked_at: { type: string, format: date-time, nullable: true }
        sort_order: { type: integer }
        created_at: { type: string, format: date-time }

    TestRunUseCase:
      type: object
      properties:
        id: { type: integer }
        test_run_id: { type: integer }
        use_case_id: { type: integer }
        assigned_tester_id: { type: integer, nullable: true }
        free_pass: { type: boolean }
        status: { type: string, enum: [pending, in_progress, passed, failed, passed_by_agreement] }
        tester_sign_off: { type: boolean }
        tester_sign_off_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    Execution:
      type: object
      properties:
        id: { type: integer }
        test_case_id: { type: integer }
        test_run_id: { type: integer, nullable: true }
        iteration_number: { type: integer }
        tester_name: { type: string, nullable: true }
        tester_id: { type: integer, nullable: true }
        status: { type: string, enum: [in_progress, completed, failed] }
        overall_result: { type: string, enum: [passed, failed, passed_by_agreement], nullable: true }
        notes: { type: string, nullable: true }
        executed_at: { type: string, format: date-time }

    StepResult:
      type: object
      properties:
        id: { type: integer }
        execution_id: { type: integer }
        step_id: { type: integer }
        actual_result: { type: string, nullable: true }
        comments: { type: string, nullable: true }
        passed: { type: boolean, nullable: true }
        recorded_at: { type: string, format: date-time }

    Defect:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        test_run_id: { type: integer, nullable: true }
        test_case_id: { type: integer }
        execution_id: { type: integer, nullable: true }
        ticket_type: { type: string, enum: [SOFTWARE_BUG, ENVIRONMENT_ISSUE, DATA_ISSUE, REQUIREMENTS_GAP] }
        status: { type: string, enum: [NEW, TRIAGED, ASSIGNED, IN_PROGRESS, BLOCKED, RESOLVED_DEV, READY_FOR_VERIFICATION, REGRESSED, CLOSED, PASSED_BY_AGREEMENT] }
        severity: { type: string, nullable: true }
        priority: { type: string, nullable: true }
        assigned_to_user_id: { type: integer, nullable: true }
        support_ticket_number: { type: string, nullable: true }
        root_cause_category: { type: string, nullable: true }
        regression_index: { type: integer }
        tester_notes: { type: string, nullable: true }
        retest_reason: { type: string, nullable: true }
        accepted_by_business_note: { type: string, nullable: true }
        rejection_log: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        resolved_at: { type: string, format: date-time, nullable: true }
        closed_at: { type: string, format: date-time, nullable: true }

    DefectRetest:
      type: object
      properties:
        id: { type: integer }
        defect_id: { type: integer }
        test_run_id: { type: integer }
        target_verification_run_id: { type: integer, nullable: true }
        assigned_tester_id: { type: integer, nullable: true }
        retest_result: { type: string, nullable: true }
        retest_notes: { type: string, nullable: true }
        retested_by_user_id: { type: integer, nullable: true }
        retested_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    # Bug schema is deprecated — consolidated into Defect
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        defect_id: { type: integer }
        bug_number: { type: integer }
        support_ticket_number: { type: string, nullable: true }
        assigned_developer_id: { type: integer, nullable: true }
        status: { type: string, enum: [OPEN, ASSIGNED, IN_PROGRESS, RESOLVED, FAILED_TO_RESOLVE, CLOSED, REOPENED] }
        developer_notes: { type: string, nullable: true }
        failed_to_resolve_reason: { type: string, nullable: true }
        root_cause_category: { type: string, nullable: true }
        opened_at: { type: string, format: date-time }
        assigned_at: { type: string, format: date-time, nullable: true }
        resolved_at: { type: string, format: date-time, nullable: true }
        test_at: { type: string, format: date-time, nullable: true }
        failed_to_resolve_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    StatusAuditLog:
      type: object
      properties:
        id: { type: integer }
        entity_type: { type: string }
        entity_id: { type: integer }
        changed_by_user_id: { type: integer, nullable: true }
        from_status: { type: string, nullable: true }
        to_status: { type: string, nullable: true }
        reason: { type: string, nullable: true }
        changed_at: { type: string, format: date-time }

    TeamDiscussion:
      type: object
      properties:
        id: { type: integer }
        project_id: { type: integer }
        test_run_id: { type: integer }
        initiated_by_user_id: { type: integer, nullable: true }
        meeting_type: { type: string, enum: [defect_review, post_mortem] }
        is_active: { type: boolean }
        created_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }

    TeamDiscussionParticipant:
      type: object
      properties:
        id: { type: integer }
        discussion_id: { type: integer }
        user_id: { type: integer }
        can_add_notes: { type: boolean }
        added_at: { type: string, format: date-time }

    DefectNote:
      type: object
      properties:
        id: { type: integer }
        defect_id: { type: integer }
        discussion_id: { type: integer, nullable: true }
        added_by_user_id: { type: integer, nullable: true }
        note: { type: string }
        created_at: { type: string, format: date-time }

paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }

  /auth/login:
    post:
      summary: Login
      tags: [Auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user:
                    $ref: "#/components/schemas/User"

  /auth/register:
    post:
      summary: Register (Admin only)
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
                name: { type: string }
                email: { type: string }
                role: { type: string, enum: [ADMIN, USER] }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users:
    get:
      summary: List all users (Admin only)
      tags: [Users]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      summary: Create user (Admin only)
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
                name: { type: string }
                email: { type: string }
                role: { type: string, enum: [ADMIN, USER] }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{userId}:
    put:
      summary: Update user (Admin only)
      tags: [Users]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                email: { type: string }
                role: { type: string, enum: [ADMIN, USER] }
      responses:
        "200":
          description: OK

  /users/{userId}/suspend:
    put:
      summary: Suspend/unsuspend user (Admin only)
      tags: [Users]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK

  /users/{userId}/password:
    put:
      summary: Change user password (Admin only)
      tags: [Users]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                password: { type: string }
      responses:
        "200":
          description: OK

  /users/{userId}:
    delete:
      summary: Delete user (Admin only)
      tags: [Users]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /projects:
    get:
      summary: List projects
      tags: [Projects]
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      summary: Create project (Admin only)
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                designedBy: { type: string }
                moduleName: { type: string }
                designDate: { type: string }
                testLink: { type: string, nullable: true }
                testLeadId: { type: integer }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      summary: Get project by id
      tags: [Projects]
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
    put:
      summary: Update project
      tags: [Projects]
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Project"
      responses:
        "200":
          description: OK
    delete:
      summary: Delete project (Admin only)
      tags: [Projects]
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /projects/{projectId}/users:
    get:
      summary: List project users
      tags: [ProjectAssignments]
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectAssignment"
    post:
      summary: Assign user to project
      tags: [ProjectAssignments]
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userId: { type: integer }
                role: { type: string }
      responses:
        "201":
          description: Created

  /projects/{projectId}/users/{userId}:
    delete:
      summary: Remove user from project
      tags: [ProjectAssignments]
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /users/{userId}/projects:
    get:
      summary: List user's projects
      tags: [ProjectAssignments]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{projectId}/use-cases:
    get:
      summary: List use cases for project
      tags: [UseCases]
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  testScenarios:
                    type: array
                    items:
                      $ref: "#/components/schemas/UseCase"
    post:
      summary: Create use case
      tags: [UseCases]
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code: { type: string }
                name: { type: string }
                priority: { type: string, nullable: true }
                category: { type: string, nullable: true }
      responses:
        "201":
          description: Created

  /use-cases/{useCaseId}:
    put:
      summary: Update use case
      tags: [UseCases]
      parameters:
        - in: path
          name: useCaseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UseCase"
      responses:
        "200":
          description: OK
    delete:
      summary: Delete use case
      tags: [UseCases]
      parameters:
        - in: path
          name: useCaseId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /use-cases/{useCaseId}/test-cases:
    get:
      summary: List test cases for use case
      tags: [TestCases]
      parameters:
        - in: path
          name: useCaseId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestCase"
    post:
      summary: Create test case
      tags: [TestCases]
      parameters:
        - in: path
          name: useCaseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                caseNumber: { type: string }
                title: { type: string }
                testType: { type: string, nullable: true }
                estimatedMinutes: { type: integer, nullable: true }
                acceptanceCriteria: { type: string, nullable: true }
      responses:
        "201":
          description: Created

  /test-cases/{testCaseId}:
    put:
      summary: Update test case
      tags: [TestCases]
      parameters:
        - in: path
          name: testCaseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestCase"
      responses:
        "200":
          description: OK
    delete:
      summary: Delete test case
      tags: [TestCases]
      parameters:
        - in: path
          name: testCaseId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /test-cases/{testCaseId}/steps:
    get:
      summary: List steps for test case
      tags: [TestSteps]
      parameters:
        - in: path
          name: testCaseId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestStep"
    post:
      summary: Create step
      tags: [TestSteps]
      parameters:
        - in: path
          name: testCaseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestStep"
      responses:
        "201":
          description: Created

  /test-cases/{testCaseId}/steps/bulk:
    post:
      summary: Bulk create steps
      tags: [TestSteps]
      parameters:
        - in: path
          name: testCaseId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/TestStep"
      responses:
        "201":
          description: Created

  /test-steps/{stepId}:
    put:
      summary: Update step
      tags: [TestSteps]
      parameters:
        - in: path
          name: stepId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestStep"
      responses:
        "200":
          description: OK
    delete:
      summary: Delete step
      tags: [TestSteps]
      parameters:
        - in: path
          name: stepId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /projects/{projectId}/test-runs:
    get:
      summary: List test runs for project
      tags: [TestRuns]
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TestRun"
    post:
      summary: Create test run
      tags: [TestRuns]
      parameters:
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                scheduledAt: { type: string, format: date-time }
                useCaseIds: { type: array, items: { type: integer } }
      responses:
        "201":
          description: Created

  /test-runs/{testRunId}:
    get:
      summary: Get test run by id
      tags: [TestRuns]
      parameters:
        - in: path
          name: testRunId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
    patch:
      summary: Update test run
      tags: [TestRuns]
      parameters:
        - in: path
          name: testRunId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TestRun"
      responses:
        "200":
          description: OK
    delete:
      summary: Delete test run (scheduled only)
      tags: [TestRuns]
      parameters:
        - in: path
          name: testRunId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: No Content

  /test-runs/{testRunId}/use-cases:
    post:
      summary: Add use case to test run
      tags: [TestRuns]
      parameters:
        - in: path
          name: testRunId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                useCaseId: { type: integer }
